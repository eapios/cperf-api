openapi: 3.1.0
info:
  title: CPerf API
  description: RESTful API backend built with Django REST Framework
  version: 0.1.0

servers:
  - url: http://localhost:8000/api
    description: Local development server (Docker or F5 debug)

paths:
  /items/:
    get:
      summary: List all sample items
      operationId: listItems
      tags: [SampleItems]
      parameters:
        - name: ordering
          in: query
          schema:
            type: string
            enum: [created_at, -created_at, name, -name]
          description: Field to order results by (prefix with - for descending)
      responses:
        '200':
          description: A list of sample items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SampleItem'

    post:
      summary: Create a new sample item
      operationId: createItem
      tags: [SampleItems]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SampleItemCreate'
      responses:
        '201':
          description: Item created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SampleItem'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /items/{id}/:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Unique identifier of the sample item

    get:
      summary: Retrieve a sample item
      operationId: getItem
      tags: [SampleItems]
      responses:
        '200':
          description: The requested sample item
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SampleItem'
        '404':
          description: Item not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'

    put:
      summary: Update a sample item (full replacement)
      operationId: updateItem
      tags: [SampleItems]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SampleItemCreate'
      responses:
        '200':
          description: Item updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SampleItem'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '404':
          description: Item not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'

    patch:
      summary: Partially update a sample item
      operationId: partialUpdateItem
      tags: [SampleItems]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SampleItemPatch'
      responses:
        '200':
          description: Item updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SampleItem'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '404':
          description: Item not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'

    delete:
      summary: Delete a sample item
      operationId: deleteItem
      tags: [SampleItems]
      responses:
        '204':
          description: Item deleted successfully
        '404':
          description: Item not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'

components:
  schemas:
    SampleItem:
      type: object
      required: [id, name, description, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
          description: Unique identifier
        name:
          type: string
          maxLength: 255
          minLength: 1
          description: Name of the sample item
        description:
          type: string
          nullable: true
          description: Detailed description
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Creation timestamp
        updated_at:
          type: string
          format: date-time
          readOnly: true
          description: Last modification timestamp

    SampleItemCreate:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 255
          minLength: 1
          description: Name of the sample item
        description:
          type: string
          nullable: true
          description: Detailed description

    SampleItemPatch:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
          minLength: 1
          description: Name of the sample item
        description:
          type: string
          nullable: true
          description: Detailed description

    ValidationError:
      type: object
      additionalProperties:
        type: array
        items:
          type: string
      example:
        name: ["This field is required."]

    NotFoundError:
      type: object
      properties:
        detail:
          type: string
          example: "Not found."
